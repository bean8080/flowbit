services:
  postgres:
    image: postgres:16
    container_name: flowbit-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: flowbit
      POSTGRES_USER: flowbit
      POSTGRES_PASSWORD: flowbit1234
    volumes:
      - flowbit-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: flowbit-redis
    ports:
      - "6379:6379"

volumes:
  flowbit-postgres-data: