spring:
  application:
    name: flowbit

  datasource:
    url: jdbc:postgresql://localhost:5433/flowbit
    username: flowbit
    password: flowbit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
      # ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:flowbit-local-jwt-secret-key-must-be-at-least-32-bytes-long}
  access-token-expiration: 3600000